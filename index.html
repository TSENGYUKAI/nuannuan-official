<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暖暖居家長照機構 | 內部營運管理系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #FFF9F2;
            color: #44403c;
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        
        .q-card {
            background: white;
            border-radius: 40px;
            border: 4px solid #FDE6D2;
            box-shadow: 0 15px 30px -10px rgba(237, 125, 49, 0.1);
            transition: all 0.3s ease;
        }

        .content-card {
            background-color: #fafaf9;
            border: 2px solid #f5f5f4;
            border-radius: 30px;
            padding: 24px;
            transition: all 0.3s ease;
        }
        
        .content-card:hover {
            border-color: #f97316;
            transform: translateY(-2px);
        }

        @keyframes fade-in-down {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-page { animation: fade-in-down 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .animate-sun { animation: sun-shine 5s ease-in-out infinite; }
        @keyframes sun-shine {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.05) rotate(10deg); opacity: 0.8; }
        }

        .nav-item {
            color: #a8a29e;
            border-radius: 20px;
            padding: 14px 20px;
            font-weight: 900;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            cursor: pointer;
        }
        
        .nav-item:hover { background-color: #fff7ed; color: #ea580c; }
        .nav-item.active { background-color: #f97316; color: white; box-shadow: 0 10px 15px -3px rgba(249, 115, 22, 0.3); }

        .finance-tab, .hr-tab {
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 14px;
            transition: all 0.3s;
            white-space: nowrap;
            border: 2px solid transparent;
        }
        
        .hidden-section { display: none !important; }

        .custom-table { width: 100%; min-width: 800px; border-collapse: separate; border-spacing: 0; }
        .custom-table th { background-color: #fff7ed; color: #ea580c; padding: 16px; font-weight: 900; text-align: left; font-size: 13px; }
        .custom-table th:first-child { border-top-left-radius: 20px; border-bottom-left-radius: 20px; }
        .custom-table th:last-child { border-top-right-radius: 20px; border-bottom-right-radius: 20px; }
        .custom-table td { padding: 16px; border-bottom: 2px solid #f5f5f4; color: #57534e; font-weight: 700; font-size: 13px; }
        
        .folder-group-header {
            background-color: #f8fafc;
            color: #64748b;
            font-size: 12px;
            font-weight: 900;
            padding: 12px 16px;
            border-bottom: 2px solid #e2e8f0;
            text-transform: uppercase;
        }

        .editable-active {
            background-color: white !important;
            border: 2px dashed #f97316 !important;
            padding: 24px;
            outline: none;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
        }

        #toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast-item { pointer-events: auto; }
        .toast-enter { transform: translateX(100%); opacity: 0; }
        .toast-enter-active { transform: translateX(0); opacity: 1; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .toast-exit { transform: translateX(100%); opacity: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        @media print {
            body * { visibility: hidden; }
            #my-digital-payslip, #my-digital-payslip * { visibility: visible; }
            #my-digital-payslip { position: absolute; left: 0; top: 0; width: 100%; border: none !important; box-shadow: none !important; padding: 0 !important; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8 relative text-stone-700">

    <div id="toast-container"></div>

    <!-- ==================== 登入視窗 ==================== -->
    <div id="login-view" class="w-full max-sm:px-4 max-w-sm mx-auto mt-20 q-card p-10 text-center animate-page relative overflow-hidden">
        <div class="absolute -top-10 -right-10 text-orange-500 opacity-10 animate-sun pointer-events-none">
            <i class="ph-fill ph-sun" style="font-size: 150px;"></i>
        </div>
        <div class="bg-orange-50 text-orange-500 w-20 h-20 rounded-[30px] flex items-center justify-center mx-auto mb-6 shadow-inner animate-sun">
            <i class="ph-bold ph-buildings text-4xl"></i>
        </div>
        <h1 class="text-2xl font-black text-gray-800 mb-2 tracking-tight">內部營運管理系統</h1>
        <p class="text-stone-400 text-sm mb-8 font-bold">暖暖居家長照機構 專屬授權</p>
        
        <div class="mb-6 relative z-10 flex flex-col items-center">
            <label class="block text-[10px] font-black text-stone-400 mb-4 uppercase tracking-widest text-center">請透過 Google 帳號授權登入</label>
            <div id="g_id_onload"
                 data-client_id="98650990659-f82m5s5tgs1vtgujjh4dv11jua962qep.apps.googleusercontent.com" 
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleGoogleLogin"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-text="signin_with" data-size="large"></div>

            <div class="mt-8 pt-4 w-full border-t border-stone-100 flex flex-col items-center">
                <p class="text-[10px] font-black text-stone-300 mb-3 uppercase">或是使用開發者模式</p>
                <div class="flex w-full gap-2">
                    <input type="email" id="login-email" placeholder="輸入信箱測試" onkeydown="if(event.key === 'Enter') handleManualLogin()" class="w-full p-2 bg-stone-50 border-2 border-stone-200 rounded-xl text-xs font-bold focus:border-orange-500 outline-none text-center" />
                    <button onclick="handleManualLogin()" class="bg-stone-800 text-white px-4 py-2 rounded-xl text-xs font-black hover:bg-orange-500 transition-colors">
                        <i class="ph-bold ph-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== 載入中畫面 ==================== -->
    <div id="loading-view" class="hidden-section w-full flex flex-col items-center justify-center mt-40 animate-page">
        <i class="ph-bold ph-spinner animate-spin text-5xl text-orange-500 mb-4"></i>
        <h2 class="text-xl font-black text-gray-800 mb-2">正在驗證您的機構權限</h2>
        <p class="text-stone-500 font-bold tracking-widest text-sm animate-pulse">連線至資料庫同步中，請稍候...</p>
    </div>

    <!-- ==================== 拒絕存取畫面 ==================== -->
    <div id="unauthorized-view" class="hidden-section w-full max-sm:px-4 max-w-sm mx-auto mt-20 q-card p-10 text-center animate-page">
        <div class="bg-red-50 text-red-500 w-20 h-20 rounded-[30px] flex items-center justify-center mx-auto mb-6 shadow-inner">
            <i class="ph-bold ph-shield-warning text-4xl"></i>
        </div>
        <h2 class="text-2xl font-black text-gray-800 mb-2">無存取權限</h2>
        <p class="text-stone-500 text-sm mb-8 font-bold leading-relaxed">您登入的信箱未在機構白名單中。</p>
